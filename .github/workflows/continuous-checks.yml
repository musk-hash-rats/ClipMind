name: Continuous checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-and-native-checks:
    name: Frontend and native checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

      - name: Check Rust crate
        working-directory: src-tauri
        run: cargo check

      - name: Test Rust crate
        working-directory: src-tauri
        run: cargo test

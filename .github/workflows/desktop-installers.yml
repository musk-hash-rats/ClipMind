name: Desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }} installer
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact-name: clipmind-macos
            bundle-glob: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact-name: clipmind-windows
            bundle-glob: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build desktop app
        run: npm run tauri:build

      - name: Generate checksums and provenance
        run: npm run release:checksums

      - name: Upload installer and release evidence
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.bundle-glob }}
            src-tauri/target/release/bundle/SHA256SUMS
            src-tauri/target/release/bundle/provenance.json
          if-no-files-found: error
